<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sentiment Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 40px;
      width: 95%;
      max-width: 520px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    h1 {
      margin: 0 0 10px 0;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0 0 30px 0;
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 16px;
      border: none;
      padding: 16px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
    }

    textarea::placeholder {
      color: #777;
    }

    .btn {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #00f5a0, #00d9f5);
      color: #003b44;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .result {
      margin-top: 28px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: none;
    }

    .result h3 {
      margin: 0 0 12px 0;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .positive { background: #1dd1a1; color: #003b2e; }
    .negative { background: #ff6b6b; color: #4a0000; }
    .neutral  { background: #feca57; color: #4a3b00; }

    .score {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.9;
    }

    .footer {
      margin-top: 26px;
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
    }

    .loader {
      margin: 18px auto 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Sentiment Analyzer</h1>
    <p class="subtitle">
      Paste feedback, reviews, or messages and instantly detect emotional tone using AI.
    </p>

    <textarea id="userText" placeholder="Type something like: I absolutely loved the event experience!"></textarea>

    <button class="btn" onclick="analyze()">Analyze Sentiment</button>

    <div class="loader" id="loader"></div>

    <div class="result" id="resultBox">
      <h3>Analysis Result</h3>
      <div id="sentimentLine"></div>
      <div class="score" id="scoreLine"></div>
    </div>

    <div class="footer">
      Real-time sentiment scoring • Lightweight ML model
    </div>
  </div>

  <script>
    async function analyze() {
      const text = document.getElementById('userText').value.trim();
      const resultBox = document.getElementById('resultBox');
      const sentimentLine = document.getElementById('sentimentLine');
      const scoreLine = document.getElementById('scoreLine');
      const loader = document.getElementById('loader');

      if (!text) {
        alert('Please enter some text');
        return;
      }

      resultBox.style.display = 'none';
      loader.style.display = 'block';

      try {
        const response = await fetch('http://127.0.0.1:5000/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        loader.style.display = 'none';
        resultBox.style.display = 'block';

        if (data.error) {
          sentimentLine.innerHTML = data.error;
          scoreLine.innerHTML = '';
          return;
        }

        const sentiment = data.sentiment;
        const score = Number(data.score).toFixed(3);

        let badgeClass = 'neutral';
        if (sentiment === 'positive') badgeClass = 'positive';
        if (sentiment === 'negative') badgeClass = 'negative';

        sentimentLine.innerHTML = `Sentiment: <span class="badge ${badgeClass}">${sentiment.toUpperCase()}</span>`;
        scoreLine.innerHTML = `Compound Score: <strong>${score}</strong> (range: -1 to +1)`;
      } catch (err) {
        loader.style.display = 'none';
        resultBox.style.display = 'block';
        sentimentLine.innerHTML = 'Server not reachable. Is Flask running?';
        scoreLine.innerHTML = '';
      }
    }
  </script>
</body>
</html>
